services:
  # Default mode: run only MS1 (uses Upstash cloud Redis — no local Redis needed)
  # Optional modes:
  #   --profile local-infra : starts MinIO helpers
  #   --profile full-stack  : starts the previous full local stack

  minio:
    profiles: ["local-infra", "full-stack"]
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # MinIO bucket initialization for MS1 (safe to keep even if MS1 is disabled)
  minio-init:
    profiles: ["local-infra", "full-stack"]
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/neurostream-media --ignore-existing;
        echo 'Bucket neurostream-media created';
      "

  ms1:
    platform: linux/amd64
    build:
      context: ./ms1
    container_name: ms1-media-processor
    env_file:
      - ./ms1/.env
    environment:
      REDIS_URL: "rediss://default:gQAAAAAAAW-lAAIgcDEyZGJmN2E5ZmUxODg0ZGU1YTI4YThlZWI1ZTYzYjc0ZA@prepared-earwig-94117.upstash.io:6379"
    ports:
      - "8081:8081"
    volumes:
      - ms1_tmp:/tmp/neurostream
    restart: unless-stopped

  postgres:
    profiles: ["full-stack"]
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: neurostream
      POSTGRES_USER: neurostream
      POSTGRES_PASSWORD: neurostream
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    profiles: ["full-stack"]  # Not needed locally — ms1 uses Upstash cloud Redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ms3:
    profiles: ["full-stack"]
    build:
      context: ./ms3
    environment:
      DATABASE_URL: postgresql+asyncpg://neurostream:neurostream@postgres:5432/neurostream
      MS4_BASE_URL: http://host.docker.internal:8084
      EMBEDDING_DIMENSIONS: 768
    depends_on:
      - postgres
    ports:
      - "8003:8000"

  ms2:
    profiles: ["full-stack"]
    build:
      context: ./ms2
    environment:
      REDIS_URL: "rediss://default:gQAAAAAAAW-lAAIgcDEyZGJmN2E5ZmUxODg0ZGU1YTI4YThlZWI1ZTYzYjc0ZA@prepared-earwig-94117.upstash.io:6379"
      MS3_BASE_URL: http://ms3:8000
      MS4_BASE_URL: http://host.docker.internal:8084
      EMBEDDING_DIMENSIONS: 768
      MS2_PROCESS_INLINE: "true"
      MOCK_EXTERNAL_SERVICES: "true"
    depends_on:
      - redis
      - ms3
    ports:
      - "8002:8000"

  ms5:
    profiles: ["full-stack"]
    build:
      context: ./ms5-analytics
    container_name: ms5-analytics
    environment:
      DATABASE_URL: postgresql+asyncpg://neurostream:neurostream@postgres:5432/neurostream_ms5
      REDIS_URL: "rediss://default:gQAAAAAAAW-lAAIgcDEyZGJmN2E5ZmUxODg0ZGU1YTI4YThlZWI1ZTYzYjc0ZA@prepared-earwig-94117.upstash.io:6379"
      APP_ENV: development
      APP_PORT: "8085"
      INTERNAL_API_SECRET: your_shared_internal_secret
    depends_on:
      - postgres
      - redis
    ports:
      - "8085:8085"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8085"

volumes:
  ms1_tmp:
  pgdata:
  minio_data:

