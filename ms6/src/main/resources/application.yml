server:
  port: ${PORT:8086}

spring:
  application:
    name: neurostream-ms6
  jackson:
    property-naming-strategy: SNAKE_CASE
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      s3:
        endpoint: ${AWS_ENDPOINT:}
        bucket: ${AWS_BUCKET_NAME:}
        path-style-access-enabled: ${AWS_S3_PATH_STYLE:true}
      credentials:
        access-key: ${AWS_ACCESS_KEY:}
        secret-key: ${AWS_SECRET_KEY:}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

ms3:
  base-url: ${MS3_BASE_URL:http://13.201.89.80:8003}
  default-limit: ${MS3_DEFAULT_LIMIT:5}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  max-output-tokens: ${GEMINI_MAX_TOKENS:1024}

agent:
  analyzer-temperature: 0.1
  synthesizer-temperature: 0.5
  citation-temperature: 0.0
  planner-temperature: 0.3
  summarizer-temperature: 0.3
  research-max-iterations: ${RESEARCH_MAX_ITERATIONS:5}
  summarize-window-seconds: ${SUMMARIZE_WINDOW_SECONDS:300}

# (RabbitMQ config merged up to the primary spring block)

logging:
  level:
    com.example.MS6: DEBUG
