version: "3.8"

services:
  ms5:
    build: .
    container_name: ms5-analytics
    env_file: .env
    environment:
      # Override .env values for Docker networking (service names, not localhost)
      DATABASE_URL: postgresql+asyncpg://user:password@postgres:5432/neurostream_db
      REDIS_URL: "rediss://default:gQAAAAAAAW-lAAIgcDEyZGJmN2E5ZmUxODg0ZGU1YTI4YThlZWI1ZTYzYjc0ZA@prepared-earwig-94117.upstash.io:6379"
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8085"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ms5-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neurostream_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d neurostream_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ms5-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
