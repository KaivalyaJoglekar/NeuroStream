version: "3.8"

services:
  ms1:
    build: .
    container_name: ms1-media-processor
    env_file: .env
    ports:
      - "8081:8081"
    volumes:
      - /tmp/neurostream:/tmp/neurostream
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ms1-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: ms1-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - minio_data:/data

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: ms1-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/neurostream-media --ignore-existing;
        echo 'Bucket neurostream-media created';
      "

volumes:
  redis_data:
  minio_data:
