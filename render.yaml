services:
  # ----------------------------------------------------
  # Internal Redis Cache
  # ----------------------------------------------------
  - type: redis
    name: neurostream-redis
    plan: free
    ipAllowList: [] # Allows access only from other Render services in the same account

  # ----------------------------------------------------
  # MS5 PostgreSQL Database
  # ----------------------------------------------------
  - type: psql
    name: neurostream-db
    plan: free
    
    # ----------------------------------------------------
  # MS5 Analytics Service
  # ----------------------------------------------------
  - type: web
    name: ms5-analytics
    env: docker
    dockerContext: ms5-analytics
    dockerfilePath: ms5-analytics/Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: neurostream-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: neurostream-redis
          type: redis
          property: connectionString
      # Other standard analytics values
      - key: TIMESTAMP_BUCKET_SECONDS
        value: "5"
      - key: MIN_REVISIT_COUNT
        value: "2"
      - key: TOP_HIGHLIGHTS_COUNT
        value: "5"
      - key: IMPORTANT_SECTIONS_COUNT
        value: "10"
      - key: CACHE_TTL_SECONDS
        value: "300"
      - key: INTERNAL_API_SECRET
        sync: false # You will enter this securely in Render Dashboard (get from MS4 teammate)

  # ----------------------------------------------------
  # MS1 Media Processor Service
  # ----------------------------------------------------
  - type: web
    name: ms1-media-processor
    env: docker
    dockerContext: ms1
    dockerfilePath: ms1/Dockerfile
    plan: free
    envVars:
      - key: REDIS_URL
        fromService:
          name: neurostream-redis
          type: redis
          property: connectionString
      - key: REDIS_QUEUE_NAME
        value: media_processing_jobs
      - key: WORKER_COUNT
        value: "2" # Lowered for free tier constraints
      - key: TEMP_DIR
        value: /tmp
      - key: CHUNK_DURATION_SECONDS
        value: "30"
      - key: FRAME_SAMPLE_FPS
        value: "1"
      - key: AUDIO_FORMAT
        value: wav
      # Connections that you must enter manually via Render Dashboard:
      - key: MS4_CALLBACK_URL
        sync: false # Get this from the teammate hosting MS4
      - key: AWS_REGION
        sync: false # e.g. ap-south-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_ENDPOINT
        value: "" # Leave empty when using AWS S3
      - key: S3_RAW_PREFIX
        value: raw-uploads
      - key: S3_PROCESSED_PREFIX
        value: processed
